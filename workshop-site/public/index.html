<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>From Zero to Cloud — Oracle Student Club</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-glow"></div>

  <div class="container">

    <header>
      <img src="logo.png" alt="Oracle Student Club" class="logo">
      <div class="club-name">ORACLE STUDENT CLUB</div>
    </header>

    <main>
      <div class="badge">🚀 DEPLOYED SUCCESSFULLY</div>

      <h1>
        <span class="from">From</span>
        <span class="zero">Zero</span>
        <span class="to-cloud">to <span class="gradient-text">Cloud</span></span>
      </h1>

      <p class="subtitle">
        You just shipped a container to production.
      </p>

      <p class="signature">
        Deployed by <span id="student-name" class="highlight">a workshop student</span>
      </p>

      <div class="info-grid">
        <div class="info-card">
          <div class="info-label">Hostname</div>
          <div class="info-value" id="hostname">—</div>
        </div>
        <div class="info-card">
          <div class="info-label">Uptime</div>
          <div class="info-value" id="uptime">—</div>
        </div>
        <div class="info-card">
          <div class="info-label">Status</div>
          <div class="info-value status-live">● LIVE</div>
        </div>
      </div>

      <div class="stack">
        <div class="stack-label">Powered by</div>
        <div class="stack-items">
          <span class="tech">Linux</span>
          <span class="dot">·</span>
          <span class="tech">Docker</span>
          <span class="dot">·</span>
          <span class="tech">Google Cloud</span>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-text">From Zero to Cloud · Workshop 2026</div>
      <div class="footer-credit">Built with ❤️ at the Oracle Student Club</div>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
